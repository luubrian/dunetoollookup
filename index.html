<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dune Tool Catalog</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 20px; margin-bottom: 16px; }

  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="search"], select { padding: 6px 10px; font-size: 14px; border: 1px solid #ccc; }
  input[type="search"] { flex: 1; }
  button { padding: 6px 14px; font-size: 14px; cursor: pointer; }
  button.primary { background: #333; color: #fff; border: none; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #333; cursor: pointer; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f9f9f9; }

  .actions button { background: none; border: none; cursor: pointer; font-size: 13px; color: #666; padding: 2px 6px; }
  .actions button:hover { color: #000; }

  .info { font-size: 12px; color: #888; margin-top: 10px; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 10; }
  .overlay.open { display: flex; }
  .modal { background: #fff; padding: 24px; width: 400px; max-width: 95vw; border: 1px solid #ccc; }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  input[type="text"], select, textarea { width: 100%; padding: 6px 8px; font-size: 14px; border: 1px solid #ccc; box-sizing: border-box; }
  textarea { resize: vertical; height: 60px; }
  .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* Category editor */
  .cat-list { list-style: none; padding: 0; margin: 0 0 12px; max-height: 240px; overflow-y: auto; }
  .cat-list li { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .cat-list li:last-child { border-bottom: none; }
  .cat-list button { background: none; border: none; color: #999; cursor: pointer; font-size: 13px; padding: 2px 6px; }
  .cat-list button:hover { color: #c00; }
  .cat-add-row { display: flex; gap: 8px; }
  .cat-add-row input { flex: 1; }
</style>
</head>
<body>

<h1>Dune Tool Catalog</h1>

<div class="controls">
  <input type="search" id="searchInput" placeholder="Search..." oninput="render()">
  <select id="catFilter" onchange="render()"></select>
  <button class="primary" onclick="openModal()">+ Add Tool</button>
  <button onclick="openCatModal()">Edit Categories</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<table>
  <thead>
    <tr>
      <th onclick="sortBy('name')">Name</th>
      <th onclick="sortBy('category')">Category</th>
      <th onclick="sortBy('location')">Location</th>
      <th>Notes</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="info" id="info"></div>

<!-- Add/Edit Tool Modal -->
<div class="overlay" id="overlay" onclick="outsideClick(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Tool</h2>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="f-name">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="f-cat"></select>
    </div>
    <div class="form-group">
      <label>Location *</label>
      <input type="text" id="f-loc">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes"></textarea>
    </div>
    <div class="modal-buttons">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveTool()">Save</button>
    </div>
  </div>
</div>

<!-- Category Editor Modal -->
<div class="overlay" id="catOverlay" onclick="outsideCatClick(event)">
  <div class="modal">
    <h2>Edit Categories</h2>
    <ul class="cat-list" id="catList"></ul>
    <div class="cat-add-row">
      <input type="text" id="newCatInput" placeholder="New category name..." onkeydown="if(event.key==='Enter') addCategory()">
      <button class="primary" onclick="addCategory()">Add</button>
    </div>
    <div class="modal-buttons">
      <button class="primary" onclick="closeCatModal()">Done</button>
    </div>
  </div>
</div>

<script>
  const KEY = 'tool_catalog_v1';
  const CAT_KEY = 'tool_catalog_cats_v1';

  const DEFAULT_CATS = ['Hand Tool','Power Tool','Measurement','Safety','Fastener','Other'];
  const DEFAULTS = [
    { id:1, name:'10mm Combination Wrench', category:'Hand Tool', location:'Shelf A1', notes:'' },
    { id:2, name:'Cordless Drill — DeWalt 20V', category:'Power Tool', location:'Charging Station', notes:'Batteries on shelf below' },
    { id:3, name:'Digital Calipers', category:'Measurement', location:'Drawer M2', notes:'0.01mm resolution' },
    { id:4, name:'Torque Wrench 1/2"', category:'Hand Tool', location:'Shelf A2', notes:'10–150 ft-lb' },
    { id:5, name:'Safety Glasses', category:'Safety', location:'Entry Rack', notes:'' },
  ];

  let tools = JSON.parse(localStorage.getItem(KEY)) || DEFAULTS;
  let categories = JSON.parse(localStorage.getItem(CAT_KEY)) || DEFAULT_CATS;
  let nextId = tools.length ? Math.max(...tools.map(t => t.id)) + 1 : 1;
  let editId = null;
  let sortCol = 'name', sortDir = 1;

  function save() { localStorage.setItem(KEY, JSON.stringify(tools)); }
  function saveCats() { localStorage.setItem(CAT_KEY, JSON.stringify(categories)); }

  function populateCatDropdowns() {
    const filterSel = document.getElementById('catFilter');
    const formSel = document.getElementById('f-cat');
    const currentFilter = filterSel.value;
    const currentForm = formSel.value;

    filterSel.innerHTML = `<option value="">All Categories</option>` +
      categories.map(c => `<option value="${c}">${c}</option>`).join('');
    filterSel.value = categories.includes(currentFilter) ? currentFilter : '';

    formSel.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    formSel.value = categories.includes(currentForm) ? currentForm : categories[0];
  }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    let list = tools.filter(t =>
      (!q || [t.name, t.location, t.notes, t.category].some(f => (f||'').toLowerCase().includes(q))) &&
      (!cat || t.category === cat)
    ).sort((a, b) => {
      let va = String(a[sortCol]||'').toLowerCase();
      let vb = String(b[sortCol]||'').toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });

    document.getElementById('tbody').innerHTML = list.length
      ? list.map(t => `<tr>
          <td>${t.name}</td>
          <td>${t.category}</td>
          <td>${t.location}</td>
          <td>${t.notes || '—'}</td>
          <td class="actions">
            <button onclick="editTool(${t.id})">Edit</button>
            <button onclick="deleteTool(${t.id})">Delete</button>
          </td>
        </tr>`).join('')
      : `<tr><td colspan="5" style="text-align:center;padding:40px;color:#aaa">No tools found.</td></tr>`;

    document.getElementById('info').textContent =
      (q || cat) ? `Showing ${list.length} of ${tools.length} tools` : `${tools.length} tools`;
  }

  function sortBy(col) {
    sortDir = sortCol === col ? -sortDir : 1;
    sortCol = col;
    render();
  }

  // ── Tool Modal ──────────────────────────────────────────────────────
  function openModal(tool = null) {
    editId = tool?.id ?? null;
    populateCatDropdowns();
    document.getElementById('modalTitle').textContent = tool ? 'Edit Tool' : 'Add Tool';
    document.getElementById('f-name').value = tool?.name || '';
    document.getElementById('f-cat').value = tool?.category || categories[0];
    document.getElementById('f-loc').value = tool?.location || '';
    document.getElementById('f-notes').value = tool?.notes || '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function outsideClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
  function editTool(id) { openModal(tools.find(t => t.id === id)); }

  function saveTool() {
    const name = document.getElementById('f-name').value.trim();
    const loc = document.getElementById('f-loc').value.trim();
    if (!name || !loc) { alert('Name and Location are required.'); return; }
    const data = { name, location: loc, category: document.getElementById('f-cat').value,
      notes: document.getElementById('f-notes').value.trim() };
    if (editId) tools = tools.map(t => t.id === editId ? { ...t, ...data } : t);
    else tools.push({ id: nextId++, ...data });
    save(); closeModal(); render();
  }

  function deleteTool(id) {
    if (!confirm('Delete this tool?')) return;
    tools = tools.filter(t => t.id !== id);
    save(); render();
  }

  // ── Category Modal ──────────────────────────────────────────────────
  function openCatModal() {
    renderCatList();
    document.getElementById('catOverlay').classList.add('open');
    setTimeout(() => document.getElementById('newCatInput').focus(), 50);
  }

  function closeCatModal() {
    document.getElementById('catOverlay').classList.remove('open');
    populateCatDropdowns();
    render();
  }

  function outsideCatClick(e) { if (e.target === document.getElementById('catOverlay')) closeCatModal(); }

  function renderCatList() {
    document.getElementById('catList').innerHTML = categories.map((c, i) => `
      <li>
        <span>${c}</span>
        <button onclick="deleteCategory(${i})" title="Remove">✕</button>
      </li>`).join('');
  }

  function addCategory() {
    const val = document.getElementById('newCatInput').value.trim();
    if (!val) return;
    if (categories.includes(val)) { alert('Category already exists.'); return; }
    categories.push(val);
    saveCats();
    document.getElementById('newCatInput').value = '';
    renderCatList();
  }

  function deleteCategory(i) {
    const name = categories[i];
    const inUse = tools.some(t => t.category === name);
    if (inUse && !confirm(`"${name}" is used by some tools. Remove anyway?`)) return;
    categories.splice(i, 1);
    saveCats();
    renderCatList();
  }

  function exportCSV() {
    const rows = [['Name','Category','Location','Notes'],
      ...tools.map(t => [t.name, t.category, t.location, t.notes])
    ].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows);
    a.download = 'dune-tool-catalog.csv';
    a.click();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCatModal(); }
  });

  populateCatDropdowns();
  render();
</script>
</body>
</html>
