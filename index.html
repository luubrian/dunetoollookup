<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dune HQ Inventory</title>
<style>
  body { font-family: sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
  .setup { background: #fff8e1; border: 1px solid #f0c040; padding: 16px; margin-bottom: 20px; border-radius: 4px; }
  .setup h3 { margin: 0 0 8px; }
  .setup p { font-size: 13px; margin: 0 0 10px; }
  .setup input { width: 100%; padding: 7px 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; margin-bottom: 8px; }
  .setup button { padding: 7px 16px; margin-right: 8px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; font-size: 13px; }
  .setup .connect { background: #1a73e8; color: white; border-color: #1a73e8; }
  .controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .controls input, .controls select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; }
  .controls input { flex: 1; min-width: 200px; }
  .info { font-size: 13px; color: #555; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f1f3f4; text-align: left; padding: 8px 10px; border-bottom: 2px solid #ddd; cursor: pointer; white-space: nowrap; user-select: none; }
  th:hover { background: #e8eaed; }
  td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
  tr:hover td { background: #fafafa; }
  mark { background: #fff176; border-radius: 2px; }
  .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .status { font-size: 12px; color: #888; }
  .change-link { font-size: 12px; color: #aaa; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<h1>Dune HQ Inventory</h1>
<p class="subtitle">HQ (Ritchey) Main Inventory</p>

<div class="setup" id="setup">
  <h3>Connect to Google Sheets</h3>
  <p>Paste your Google Sheet URL below (the regular URL from your browser's address bar is fine).</p>
  <input type="url" id="urlInput" placeholder="https://docs.google.com/spreadsheets/d/..." />
  <div>
    <button class="connect" onclick="connectSheet()">Connect</button>
    <button onclick="loadDemo()">Load Demo</button>
  </div>
</div>

<div class="controls">
  <input type="search" id="search" placeholder="Search by name, category, notes..." oninput="doFilter()">
  <select id="catFilter" onchange="doFilter()"><option value="">All Categories</option></select>
  <select id="locFilter" onchange="doFilter()"><option value="">All Locations</option></select>
  <button onclick="loadData()" style="padding:7px 12px;border:1px solid #ccc;border-radius:3px;cursor:pointer;font-size:13px;">Refresh</button>
</div>

<div class="info" id="info"></div>

<table>
  <thead>
    <tr>
      <th onclick="doSort('Name')">Name <span id="s-Name"></span></th>
      <th onclick="doSort('Category')">Category <span id="s-Category"></span></th>
      <th onclick="doSort('Location')">Location <span id="s-Location"></span></th>
      <th>Specific Location</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="bottom-bar">
  <span class="status" id="status"></span>
  <span class="change-link" id="changeLink" style="display:none" onclick="changeSheet()">Change sheet URL</span>
</div>

<script>
var allRows=[], shown=[], sortCol='', sortDir=1;
var STORAGE_KEY='dune_sheet_url';

function getUrl(){return localStorage.getItem(STORAGE_KEY)||'';}
function saveUrl(u){localStorage.setItem(STORAGE_KEY,u);}

function extractSheetId(url) {
  var m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

function buildFetchUrl(sheetUrl) {
  var id = extractSheetId(sheetUrl);
  if (!id) return null;
  var gidMatch = sheetUrl.match(/[#&]gid=(\d+)/);
  var gid = gidMatch ? gidMatch[1] : '0';
  return 'https://docs.google.com/spreadsheets/d/' + id + '/gviz/tq?tqx=out:csv&gid=' + gid;
}

async function loadData(){
  var rawUrl = getUrl();
  if(!rawUrl){document.getElementById('setup').style.display='';return;}
  var fetchUrl = buildFetchUrl(rawUrl);
  if (!fetchUrl) { document.getElementById('status').textContent='Could not parse sheet ID from URL.'; return; }
  document.getElementById('status').textContent='Syncing...';
  try{
    var res = await fetch(fetchUrl);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    if (!text.includes(',')) throw new Error('Unexpected response');
    processData(parseCSV(text));
    document.getElementById('status').textContent='Last synced: '+new Date().toLocaleTimeString();
    setTimeout(loadData, 30000);
  }catch(e){
    document.getElementById('status').textContent='Error: ' + e.message + '. Make sure the sheet is shared (Anyone with link can view).';
  }
}

function connectSheet(){
  var url=document.getElementById('urlInput').value.trim();
  if(!url){alert('Please enter a URL.');return;}
  saveUrl(url);
  document.getElementById('setup').style.display='none';
  document.getElementById('changeLink').style.display='';
  loadData();
}

function changeSheet(){
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('urlInput').value='';
  document.getElementById('setup').style.display='';
  document.getElementById('changeLink').style.display='none';
  allRows=[];shown=[];
  document.getElementById('tbody').innerHTML='';
  document.getElementById('info').textContent='';
  document.getElementById('status').textContent='';
}

function processData(rows){
  allRows=rows.filter(function(r){return r['Name']&&r['Name'].trim();});
  var cats=[...new Set(allRows.map(function(r){return r['Category'];}).filter(Boolean))].sort();
  var locs=[...new Set(allRows.map(function(r){return (r['Location']||'').trim();}).filter(Boolean))].sort();
  fillSelect('catFilter',cats,'All Categories');
  fillSelect('locFilter',locs,'All Locations');
  doFilter();
}

function fillSelect(id,opts,placeholder){
  var sel=document.getElementById(id);
  var cur=sel.value;
  sel.innerHTML='<option value="">'+placeholder+'</option>'+opts.map(function(o){return '<option value="'+esc(o)+'">'+esc(o)+'</option>';}).join('');
  if(cur)sel.value=cur;
}

function doFilter(){
  var q=document.getElementById('search').value.toLowerCase();
  var cat=document.getElementById('catFilter').value;
  var loc=document.getElementById('locFilter').value;
  shown=allRows.filter(function(r){
    if(cat&&(r['Category']||'').trim()!==cat)return false;
    if(loc&&(r['Location']||'').trim()!==loc)return false;
    if(q){
      var hay=[r['Name'],r['Category'],r['Location'],r['Notes']].join(' ').toLowerCase();
      if(hay.indexOf(q)===-1)return false;
    }
    return true;
  });
  if(sortCol)shown.sort(function(a,b){
    var av=(a[sortCol]||'').toLowerCase(),bv=(b[sortCol]||'').toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  render(q);
}

function formatNotes(raw) {
  if (!raw) return '';
  // Replace literal \n strings and real newlines with ", "
  return raw.replace(/\\n/g, ', ').replace(/\n/g, ', ').replace(/\r/g, '').substring(0, 150);
}

function render(q){
  document.getElementById('info').textContent='Showing '+shown.length+' of '+allRows.length+' items';
  if(!shown.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="5" style="text-align:center;padding:30px;color:#999">No items found</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML=shown.map(function(r){
    return '<tr>'
      +'<td>'+highlight(r['Name']||'',q)+'</td>'
      +'<td>'+highlight(r['Category']||'',q)+'</td>'
      +'<td>'+highlight(r['Location']||'',q)+'</td>'
      +'<td style="color:#555">'+esc(r['Specific location']||'')+'</td>'
      +'<td style="color:#777">'+esc(formatNotes(r['Notes']))+'</td>'
      +'</tr>';
  }).join('');
}

function doSort(col){
  sortDir=sortCol===col?-sortDir:1;
  sortCol=col;
  document.querySelectorAll('th span').forEach(function(s){s.textContent='';});
  document.getElementById('s-'+col).textContent=sortDir===1?' ▲':' ▼';
  doFilter();
}

function highlight(text,q){
  if(!q)return esc(text);
  return esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return '<mark>'+m+'</mark>';});
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseCSV(text){
  var lines=text.split('\n');
  var headers=parseRow(lines[0]);
  return lines.slice(1).filter(function(l){return l.trim();}).map(function(l){
    var vals=parseRow(l);
    var obj={};
    headers.forEach(function(h,i){obj[h.trim()]=(vals[i]||'').trim();});
    return obj;
  });
}

function parseRow(line){
  var res=[],cur='',q=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);
  return res;
}

function loadDemo(){
  document.getElementById('setup').style.display='none';
  document.getElementById('changeLink').style.display='';
  processData([
    {Name:'Pens',Category:'Handtools',Location:'Small Husky Drawer','Specific location':'Top middle drawer',Notes:''},
    {Name:'Calipers',Category:'Measurement',Location:'Large Husky Drawer','Specific location':'Second drawer',Notes:''},
    {Name:'Assorted multi-color fuses',Category:'Fuses',Location:'EE Shelf','Specific location':'3rd shelf, fuse box',Notes:'2.0A\n3.0A\n5.0A\n7.5A\n10.0A\n15.0A\n20.0A'},
    {Name:'Arduino Nano',Category:'PCBs',Location:'EE Shelf','Specific location':'4th shelf, PCB box',Notes:''},
    {Name:'Work Gloves',Category:'PPE',Location:'Small Assembly Table','Specific location':'bottom shelf',Notes:''},
  ]);
  document.getElementById('status').textContent='Demo data loaded';
}

window.onload=function(){
  var url=getUrl();
  if(url){
    document.getElementById('urlInput').value=url;
    document.getElementById('setup').style.display='none';
    document.getElementById('changeLink').style.display='';
    loadData();
  }
};
</script>
</body>
</html>
