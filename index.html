<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dune Tool Catalog</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 20px; margin-bottom: 16px; }

  .controls { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type="search"], select { padding: 6px 10px; font-size: 14px; border: 1px solid #ccc; }
  input[type="search"] { flex: 1; }
  button { padding: 6px 14px; font-size: 14px; cursor: pointer; }
  button.primary { background: #333; color: #fff; border: none; }
  button:disabled { opacity: 0.5; cursor: default; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #333; cursor: pointer; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f9f9f9; }

  .actions button { background: none; border: none; cursor: pointer; font-size: 13px; color: #666; padding: 2px 6px; }
  .actions button:hover { color: #000; }

  .info { font-size: 12px; color: #888; margin-top: 10px; }

  .status-bar { font-size: 12px; padding: 6px 10px; margin-bottom: 10px; display: none; }
  .status-bar.loading { display: block; background: #fffbe6; border: 1px solid #ffe58f; color: #7d5f00; }
  .status-bar.error   { display: block; background: #fff1f0; border: 1px solid #ffa39e; color: #a8071a; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 10; }
  .overlay.open { display: flex; }
  .modal { background: #fff; padding: 24px; width: 400px; max-width: 95vw; border: 1px solid #ccc; }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  input[type="text"], select, textarea { width: 100%; padding: 6px 8px; font-size: 14px; border: 1px solid #ccc; box-sizing: border-box; }
  textarea { resize: vertical; height: 60px; }
  .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  .cat-list { list-style: none; padding: 0; margin: 0 0 12px; max-height: 240px; overflow-y: auto; }
  .cat-list li { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .cat-list li:last-child { border-bottom: none; }
  .cat-list button { background: none; border: none; color: #999; cursor: pointer; font-size: 13px; padding: 2px 6px; }
  .cat-list button:hover { color: #c00; }
  .cat-add-row { display: flex; gap: 8px; }
  .cat-add-row input { flex: 1; }

  .config-banner { background: #fffbe6; border: 1px solid #ffe58f; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; display: none; }
  .config-banner.show { display: block; }
</style>
</head>
<body>

<script>
  const SCRIPT_URL = 'https://docs.google.com/spreadsheets/d/19BYecRWTRWKJy1CszMOX4AXV1QDoBprcYvlHzKyCzvQ/edit?gid=1936647090#gid=1936647090';
</script>

<h1>Dune Tool Catalog</h1>
<div class="config-banner" id="configBanner">
  ⚠️ <strong>Setup required:</strong> Replace <code>YOUR_APPS_SCRIPT_URL_HERE</code> in this file with your deployed Apps Script URL.
</div>
<div class="status-bar" id="statusBar"></div>

<div class="controls">
  <input type="search" id="searchInput" placeholder="Search..." oninput="renderTable()">
  <select id="catFilter" onchange="renderTable()"></select>
  <button class="primary" onclick="openModal()">+ Add Tool</button>
  <button onclick="openCatModal()">Edit Categories</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<table>
  <thead>
    <tr>
      <th onclick="sortBy('name')">Name</th>
      <th onclick="sortBy('category')">Category</th>
      <th onclick="sortBy('location')">Location</th>
      <th>Notes</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="info" id="info"></div>

<!-- Tool Modal -->
<div class="overlay" id="overlay" onclick="outsideClick(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Tool</h2>
    <div class="form-group"><label>Name *</label><input type="text" id="f-name"></div>
    <div class="form-group"><label>Category</label><select id="f-cat"></select></div>
    <div class="form-group"><label>Location *</label><input type="text" id="f-loc"></div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes"></textarea></div>
    <div class="modal-buttons">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="saveBtn" onclick="saveTool()">Save</button>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="overlay" id="catOverlay" onclick="outsideCatClick(event)">
  <div class="modal">
    <h2>Edit Categories</h2>
    <ul class="cat-list" id="catList"></ul>
    <div class="cat-add-row">
      <input type="text" id="newCatInput" placeholder="New category name..." onkeydown="if(event.key==='Enter') addCategory()">
      <button class="primary" onclick="addCategory()">Add</button>
    </div>
    <div class="modal-buttons">
      <button class="primary" onclick="closeCatModal()">Done</button>
    </div>
  </div>
</div>

<script>
  let tools = [], categories = [], editId = null;
  let sortCol = 'name', sortDir = 1;

  function setStatus(msg, type = 'loading') {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = 'status-bar ' + type;
  }
  function clearStatus() { document.getElementById('statusBar').className = 'status-bar'; }

  // All requests are GET to avoid CORS issues with Apps Script
  async function api(params) {
    const url = SCRIPT_URL + '?' + new URLSearchParams(params);
    const res = await fetch(url);
    return res.json();
  }

  async function loadAll() {
    if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      document.getElementById('configBanner').classList.add('show');
      return;
    }
    setStatus('Loading…');
    try {
      const [toolData, catData] = await Promise.all([
        api({ action: 'getTools' }),
        api({ action: 'getCategories' }),
      ]);
      tools = toolData;
      categories = catData;
      populateCatDropdowns();
      renderTable();
      clearStatus();
    } catch(e) {
      setStatus('Failed to load data. Check your Apps Script URL.', 'error');
    }
  }

  function populateCatDropdowns() {
    const filterSel = document.getElementById('catFilter');
    const formSel = document.getElementById('f-cat');
    const cf = filterSel.value, ff = formSel.value;
    filterSel.innerHTML = `<option value="">All Categories</option>` + categories.map(c => `<option>${c}</option>`).join('');
    filterSel.value = categories.includes(cf) ? cf : '';
    formSel.innerHTML = categories.map(c => `<option>${c}</option>`).join('');
    formSel.value = categories.includes(ff) ? ff : categories[0];
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    let list = tools.filter(t =>
      (!q || [t.name, t.location, t.notes, t.category].some(f => (f||'').toLowerCase().includes(q))) &&
      (!cat || t.category === cat)
    ).sort((a, b) => {
      let va = String(a[sortCol]||'').toLowerCase(), vb = String(b[sortCol]||'').toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });

    document.getElementById('tbody').innerHTML = list.length
      ? list.map(t => `<tr>
          <td>${t.name}</td><td>${t.category}</td><td>${t.location}</td><td>${t.notes||'—'}</td>
          <td class="actions">
            <button onclick="editTool('${t.id}')">Edit</button>
            <button onclick="deleteTool('${t.id}')">Delete</button>
          </td>
        </tr>`).join('')
      : `<tr><td colspan="5" style="text-align:center;padding:40px;color:#aaa">No tools found.</td></tr>`;

    document.getElementById('info').textContent =
      (q || cat) ? `Showing ${list.length} of ${tools.length} tools` : `${tools.length} tools`;
  }

  function sortBy(col) { sortDir = sortCol === col ? -sortDir : 1; sortCol = col; renderTable(); }

  function openModal(tool = null) {
    editId = tool?.id ?? null;
    populateCatDropdowns();
    document.getElementById('modalTitle').textContent = tool ? 'Edit Tool' : 'Add Tool';
    document.getElementById('f-name').value = tool?.name || '';
    document.getElementById('f-cat').value = tool?.category || categories[0];
    document.getElementById('f-loc').value = tool?.location || '';
    document.getElementById('f-notes').value = tool?.notes || '';
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function outsideClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
  function editTool(id) { openModal(tools.find(t => String(t.id) === String(id))); }

  async function saveTool() {
    const name = document.getElementById('f-name').value.trim();
    const loc = document.getElementById('f-loc').value.trim();
    if (!name || !loc) { alert('Name and Location are required.'); return; }
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    const data = { name, location: loc, category: document.getElementById('f-cat').value, notes: document.getElementById('f-notes').value.trim() };
    try {
      if (editId) {
        await api({ action: 'editTool', id: editId, ...data });
        tools = tools.map(t => String(t.id) === String(editId) ? { ...t, ...data } : t);
      } else {
        const res = await api({ action: 'addTool', ...data });
        tools.push({ id: res.id, ...data });
      }
      closeModal(); renderTable();
    } catch(e) { alert('Save failed. Please try again.'); }
    finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
  }

  async function deleteTool(id) {
    if (!confirm('Delete this tool?')) return;
    try {
      await api({ action: 'deleteTool', id });
      tools = tools.filter(t => String(t.id) !== String(id));
      renderTable();
    } catch(e) { alert('Delete failed.'); }
  }

  function openCatModal() { renderCatList(); document.getElementById('catOverlay').classList.add('open'); setTimeout(() => document.getElementById('newCatInput').focus(), 50); }
  function closeCatModal() { document.getElementById('catOverlay').classList.remove('open'); populateCatDropdowns(); renderTable(); }
  function outsideCatClick(e) { if (e.target === document.getElementById('catOverlay')) closeCatModal(); }

  function renderCatList() {
    document.getElementById('catList').innerHTML = categories.map(c => `
      <li><span>${c}</span><button onclick="deleteCategory('${c}')">✕</button></li>`).join('');
  }

  async function addCategory() {
    const val = document.getElementById('newCatInput').value.trim();
    if (!val) return;
    if (categories.includes(val)) { alert('Already exists.'); return; }
    try {
      await api({ action: 'addCategory', category: val });
      categories.push(val);
      document.getElementById('newCatInput').value = '';
      renderCatList();
    } catch(e) { alert('Failed to add category.'); }
  }

  async function deleteCategory(name) {
    if (tools.some(t => t.category === name) && !confirm(`"${name}" is in use. Remove anyway?`)) return;
    try {
      await api({ action: 'deleteCategory', category: name });
      categories = categories.filter(c => c !== name);
      renderCatList();
    } catch(e) { alert('Failed to delete.'); }
  }

  function exportCSV() {
    const rows = [['Name','Category','Location','Notes'], ...tools.map(t => [t.name, t.category, t.location, t.notes])]
      .map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows);
    a.download = 'dune-tool-catalog.csv'; a.click();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeCatModal(); } });
  loadAll();
</script>
</body>
</html>
